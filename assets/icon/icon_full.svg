<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5B72FF"/>
      <stop offset="1" stop-color="#2E45E0"/>
    </linearGradient>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="26" flood-color="#101433" flood-opacity="0.28"/>
    </filter>
  </defs>
  <rect width="1024" height="1024" rx="232" fill="url(#bg)"/>
  <!-- Receipt paper with torn (zigzag) bottom edge -->
  <g filter="url(#sh)">
    <path fill="#FFFFFF" d="
      M300 232
      h424
      a40 40 0 0 1 40 40
      v452
      l-42 34 -42 -34 -42 34 -42 -34 -42 34 -42 -34 -42 34 -42 -34 -42 34 -42 -34 -42 34 -42 -34
      v-486
      a40 40 0 0 1 40 -40 z"/>
  </g>
  <!-- Header bar -->
  <rect x="360" y="316" width="304" height="46" rx="23" fill="#2E45E0"/>
  <!-- Line items -->
  <g fill="#C7CEF6">
    <rect x="360" y="410" width="210" height="30" rx="15"/>
    <rect x="606" y="410" width="58" height="30" rx="15"/>
    <rect x="360" y="470" width="180" height="30" rx="15"/>
    <rect x="606" y="470" width="58" height="30" rx="15"/>
  </g>
  <!-- Divider -->
  <rect x="360" y="536" width="304" height="6" rx="3" fill="#8E9CF0"/>
  <!-- Total row (bold) -->
  <rect x="360" y="566" width="120" height="40" rx="20" fill="#2E45E0"/>
  <rect x="556" y="566" width="108" height="40" rx="20" fill="#2E45E0"/>
  <!-- Currency badge -->
  <circle cx="700" cy="700" r="92" fill="#00C48C"/>
  <text x="700" y="734" font-family="Arial, Helvetica, sans-serif" font-size="86" font-weight="700" fill="#FFFFFF" text-anchor="middle">Rs</text>
</svg>
